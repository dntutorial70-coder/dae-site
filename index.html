<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAEL PROJECT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #0d1218; color: white; text-align: center; }
        
        /* HEADER */
        .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 15px 50px; background: rgba(0,0,0,0.5); position: sticky; top: 0; z-index: 100; }
        .logo-small { display: flex; align-items: center; gap: 15px; }
        .logo-small img { width: 35px; height: 35px; }
        nav a { color: #888; text-decoration: none; margin-left: 20px; font-size: 0.8rem; text-transform: uppercase; transition: 0.3s; }
        nav a:hover { color: white; }

        /* SOCIAL BAR */
        .social-sidebar { position: fixed; left: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; border: 1px solid #333; }
        .social-sidebar a { color: #888; font-size: 1.2rem; transition: 0.3s; }
        .social-sidebar a:hover { color: #c5a059; }

        /* HERO SECTION */
        .hero { padding: 80px 20px; }
        .label-new { color: #c5a059; font-weight: bold; letter-spacing: 3px; margin-bottom: 20px; font-size: 0.8rem; }

        /* REPARARE IMAGINE PIXELATĂ */
        .image-container { margin: 0 auto; width: fit-content; }
        .big-medallion { 
            width: 250px; /* Dimensiune mai mică pentru a rămâne CLARĂ */
            height: auto;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            display: block;
        }

        .hero-text { font-size: 3rem; font-weight: 800; margin: 30px 0; line-height: 1.1; }
        .hero-text span { color: #c5a059; }

        /* BUTON EMAIL CU LITERE MICI */
        .email-btn { 
            display: inline-flex; align-items: center; gap: 10px;
            border: 1px solid #c5a059; padding: 10px 25px; border-radius: 50px;
            color: white; text-decoration: none; font-size: 0.9rem; margin-top: 20px;
            transition: 0.3s;
        }
        .email-btn:hover { background: #c5a059; color: black; }

        /* SECȚIUNI CARE LIPSEAU (TOKENOMICS & ROADMAP) */
        .section { padding: 60px 20px; border-top: 1px solid #222; }
        .section-title { color: #c5a059; font-size: 1.5rem; margin-bottom: 30px; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: #161b22; padding: 20px; border-radius: 10px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="logo-small">
            <img src="logo_dael.png" alt="Logo">
            <span style="color: #c5a059; font-weight: bold;">DAEL PROJECT</span>
        </div>
        <nav>
            <a href="#home">Home</a>
            <a href="#tokenomics">Tokenomics</a>
            <a href="#roadmap">Roadmap</a>
        </nav>
    </div>

    <div class="social-sidebar">
        <a href="#"><i class="fab fa-twitter"></i></a>
        <a href="#"><i class="fab fa-telegram"></i></a>
        <a href="#"><i class="fab fa-linkedin"></i></a>
        <a href="#"><i class="fas fa-ship"></i></a>
    </div>

    <section class="hero" id="home">
        <div class="label-new">NEW TOKEN ERA</div>
        
        <div class="image-container">
            <img src="logo_dael.png" class="big-medallion" alt="DAEL Logo">
        </div>
        
        <h1 class="hero-text">WELCOME TO DAEL.<br><span>NEW CONTRACT,</span><br>NEW POWER.</h1>

        <!-- EMAIL CU LITERE MICI -->
        <a href="mailto:contact@daeinitiative.com" class="email-btn">
            <i class="fas fa-envelope"></i> contact@daeinitiative.com
        </a>
    </section>

    <!-- TOKENOMICS REINTEGRAT -->
    <section class="section" id="tokenomics">
        <div class="section-title">TOKENOMICS</div>
        <div class="grid">
            <div class="card"><h3>Supply</h3><p>1,000,000,000</p></div>
            <div class="card"><h3>Tax</h3><p>0% Buy / 0% Sell</p></div>
            <div class="card"><h3>Liquidity</h3><p>Burned</p></div>
        </div>
    </section>

    <!-- ROADMAP REINTEGRAT -->
    <section class="section" id="roadmap">
        <div class="section-title">ROADMAP</div>
        <div class="grid">
            <div class="card"><h3>Phase 1</h3><p>Launch & Community</p></div>
            <div class="card"><h3>Phase 2</h3><p>Listing & Growth</p></div>
            <div class="card"><h3>Phase 3</h3><p>Ecosystem Expansion</p></div>
        </div>
    </section>

</body>
</html>
