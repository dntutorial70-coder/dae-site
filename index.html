<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAEL PROJECT - Digital Asset Exchange Layer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --dark-grey: #1a1b1f; 
            --charcoal: #050505; 
            --gold: #d4af37; 
            --gold-light: #f1e4b9; 
            --neon-blue: #00f2ff; 
            --text-white: #ffffff;
            --card-grey: rgba(20, 20, 25, 0.9); 
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            background: radial-gradient(circle, var(--dark-grey) 0%, var(--charcoal) 100%); 
            color: var(--text-white); 
            text-align: center; 
            scroll-behavior: smooth;
        }

        nav {
            background: rgba(0, 0, 0, 0.9);
            padding: 20px 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        nav a {
            color: var(--gold);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        nav a:hover { color: var(--gold-light); text-shadow: 0 0 10px var(--gold); }

        header { 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding-top: 100px;
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 242, 255, 0.05) 0%, transparent 50%);
        }
        
        .main-logo { 
            width: 280px; 
            filter: drop-shadow(0 0 40px rgba(0, 242, 255, 0.6)); 
            margin-bottom: 10px;
        }

        h1 { 
            font-size: 3.5rem; 
            margin: 10px 0; 
            letter-spacing: 8px; 
            background: linear-gradient(to right, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .btn { 
            padding: 18px 45px; 
            background: linear-gradient(45deg, var(--gold), #b8860b); 
            color: black; 
            text-decoration: none; 
            font-weight: bold; 
            border-radius: 5px; 
            transition: 0.4s; 
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4); 
            cursor: pointer; 
            border: none; 
            display: inline-block;
        }

        .btn:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 0 40px var(--neon-blue);
            background: var(--neon-blue);
        }

        section { padding: 100px 20px; max-width: 1100px; margin: 0 auto; }
        
        .card-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 30px; }
        .card { 
            background: var(--card-grey); 
            padding: 40px; 
            width: 280px; 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            backdrop-filter: blur(15px);
        }

        .contract-box { 
            background: rgba(0,0,0,0.7); 
            padding: 50px; 
            border: 2px dashed var(--gold); 
            border-radius: 10px;
        }
        
        code { 
            color: var(--neon-blue); 
            font-size: 1.2rem; 
            display: block; 
            margin: 30px 0; 
            word-break: break-all; 
            font-family: monospace; 
        }

        footer { 
            background: #050505; 
            padding: 80px 20px; 
            border-top: 1px solid var(--gold); 
        }
        
        .social-icons a { 
            color: var(--gold); 
            font-size: 40px; 
            margin: 0 20px; 
            transition: 0.3s; 
        }
        
        .social-icons a:hover { color: var(--neon-blue); transform: scale(1.2); }
    </style>
</head>
<body>

    <nav>
        <a href="#tokenomics">Tokenomics</a>
        <a href="#roadmap">Roadmap</a>
        <a href="#contract">Contract</a>
        <a href="#whitelist">Whitelist</a>
    </nav>

    <header>
        <img src="logo_dael.png" alt="DAEL Logo" class="main-logo">
        <h1>DAEL PROJECT</h1>
        <p style="color:#888; max-width:700px;">DIGITAL ASSET EXCHANGE LAYER. New Contract, New Power.</p>
        <a href="#whitelist" class="btn">JOIN THE ERA</a>
    </header>

    <section id="contract">
        <h2>Official DAEL Contract</h2>
        <div class="contract-box">
            <p style="color: #666;">Polygon Mainnet Address</p>
            <code id="ca">0x5876f0cb366f1b61e8797470996e76da4420676f</code>
            <button onclick="copyCA()" class="btn" style="padding: 12px 25px;">
                <i class="fas fa-copy"></i> COPY ADDRESS
            </button>
        </div>
    </section>

    <footer>
        <div class="social-icons">
            <a href="https://x.com/DaeInitiative" target="_blank"><i class="fab fa-twitter"></i></a>
            <a href="https://t.me/DaeInitiative" target="_blank"><i class="fab fa-telegram"></i></a> 
            <a href="#" target="_blank"><i class="fab fa-linkedin"></i></a>
            <a href="#" target="_blank"><i class="fas fa-ship"></i></a> 
        </div>
        <p style="margin-top: 40px; color: #444;">&copy; 2026 DAEL PROJECT. BUILT ON POLYGON.</p>
    </footer>

    <script>
        function copyCA() {
            const text = document.getElementById('ca').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("Contract Address Copied!");
            });
        }
    </script>

</body>
</html>
