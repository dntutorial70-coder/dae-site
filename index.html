<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAEL PROJECT - Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0d1218;
            --card-bg: rgba(30, 35, 41, 0.9);
            --gold: #c5a059;
            --neon-blue: #00f2ff;
            --text-grey: #848e9c;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 242, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(197, 160, 89, 0.05) 0%, transparent 40%);
            color: white;
            min-height: 100vh;
        }

        /* Header Logo & Title */
        .top-bar {
            display: flex;
            align-items: center;
            padding: 20px 50px;
            background: rgba(0,0,0,0.4);
        }
        .top-bar img { width: 45px; margin-right: 15px; filter: drop-shadow(0 0 5px var(--neon-blue)); }
        .top-bar h1 { font-size: 1.5rem; letter-spacing: 4px; color: var(--gold); margin: 0; font-weight: 300; }

        /* Meniu stil imagine */
        nav {
            background: #1e2329;
            border-top: 1px solid #333;
            border-bottom: 2px solid #111;
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        nav a {
            color: var(--text-grey);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        nav a:hover { color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        /* Main Content - Două Coloane */
        .main-container {
            display: flex;
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 40px;
            gap: 60px;
            align-items: flex-start;
        }

        /* Coloana Stângă: Logo Mare și Text */
        .left-side { flex: 1; text-align: left; }
        .label-new { color: var(--gold); font-weight: bold; letter-spacing: 2px; font-size: 0.9rem; margin-bottom: 20px; }
        .big-medallion {
            width: 320px;
            margin: 20px 0;
            filter: drop-shadow(0 0 30px rgba(0,242,255,0.3));
            animation: pulse 4s infinite ease-in-out;
        }
        .hero-text { font-size: 3rem; font-weight: 800; line-height: 1.1; margin-top: 30px; }
        .hero-text span { color: var(--gold); }

        /* Coloana Dreaptă: Carduri Contract */
        .right-side { flex: 0.7; }
        .key-addresses-label { text-align: right; color: white; letter-spacing: 2px; margin-bottom: 15px; font-weight: bold; }
        
        .contract-card {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 25px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .contract-card.retired { opacity: 0.6; filter: grayscale(0.5); }
        
        .card-title { color: var(--gold); font-size: 1.1rem; font-weight: bold; margin-bottom: 5px; }
        .network { color: var(--text-grey); font-size: 0.85rem; margin-bottom: 20px; }
        .address-box {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 1.1rem;
            margin-bottom: 20px;
            border-left: 4px solid var(--neon-blue);
        }

        .btn-copy {
            width: 100%;
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 12px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: inset 0 0 10px rgba(0,242,255,0.2), 0 0 15px rgba(0,242,255,0.2);
            transition: 0.3s;
        }
        .btn-copy:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 30px var(--neon-blue); }

        /* Socials Footer */
        footer { padding: 50px; text-align: center; background: #050505; border-top: 1px solid #222; }
        .social-icons { margin-bottom: 20px; }
        .social-icons a { color: white; font-size: 26px; margin: 0 20px; text-decoration: none; transition: 0.3s; }
        .social-icons a:hover { color: var(--neon-blue); transform: translateY(-5px); }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(0,242,255,0.2)); }
            50% { transform: scale(1.02); filter: drop-shadow(0 0 40px rgba(0,242,255,0.5)); }
        }

        @media (max-width: 900px) {
            .main-container { flex-direction: column; align-items: center; text-align: center; }
            .left-side { text-align: center; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <img src="logo_dael.png" alt="Logo">
        <h1>DAEL PROJECT</h1>
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Tokenomics</a>
        <a href="#">Migration</a>
        <a href="#">Governance</a>
        <a href="#">Security</a>
        <a href="#">Contact</a>
    </nav>

    <div class="main-container">
        <!-- Stânga -->
        <div class="left-side">
            <div class="label-new">NEW TOKEN ERA</div>
            <img src="logo_dael.png" class="big-medallion" alt="DAEL Token">
            <h1 class="hero-text">WELCOME TO DAEL.<br><span>NEW CONTRACT,</span><br>NEW POWER.</h1>
        </div>

        <!-- Dreapta -->
        <div class="right-side">
            <div class="key-addresses-label">KEY ADDRESSES</div>
            
            <!-- Card Nou -->
            <div class="contract-card">
                <div class="card-title">NEW DAEL TOKEN</div>
                <div class="network">(polygon)</div>
                <div class="address-box" id="new-ca">0x5876f0cb366f1b61e8797470996e76da4420676f</div>
                <button class="btn-copy" onclick="copyText('new-ca')">COPY ADDRESS</button>
            </div>

            <!-- Card Vechi -->
            <div class="contract-card retired">
                <div class="card-title">OLD TOKEN (RETIRED)</div>
                <div class="network">DO NOT USE</div>
                <div class="address-box">0xDAEL...EXPIRED</div>
            </div>
        </div>
    </div>

    <footer>
        <div class="social-icons">
            <a href="https://x.com/DaeInitiative" target="_blank"><i class="fab fa-twitter"></i></a>
            <a href="https://t.me/DaeInitiative" target="_blank"><i class="fab fa-telegram"></i></a>
            <a href="#" target="_blank"><i class="fab fa-linkedin"></i></a>
            <a href="#" target="_blank"><i class="fas fa-ship"></i></a>
        </div>
        <p style="color: #666; font-size: 0.8rem;">&copy; 2026 DAEL PROJECT. All Rights Reserved.</p>
    </footer>

    <script>
        function copyText(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("Address Copied to Clipboard!");
            });
        }
    </script>
</body>
</html>
