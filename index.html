<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAEL PROJECT | New Token Era</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #c5a059; --cyan: #00f2ff; --bg: #0d1218; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: white; overflow-x: hidden; }

        /* BARA DE SUS */
        .top-bar { display: flex; align-items: center; padding: 15px 40px; background: rgba(0,0,0,0.8); border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
        .top-bar img { width: 35px; height: 35px; margin-right: 15px; image-rendering: -webkit-optimize-contrast; }
        .top-bar h1 { font-size: 1.2rem; color: var(--gold); margin: 0; letter-spacing: 2px; }

        /* BUTOANE SOCIAL MEDIA (STÂNGA) */
        .social-sidebar { position: fixed; left: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 100; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); }
        .social-sidebar a { color: white; font-size: 1.2rem; transition: 0.3s; opacity: 0.7; }
        .social-sidebar a:hover { color: var(--cyan); opacity: 1; transform: scale(1.2); }

        /* CONTAINER PRINCIPAL */
        .hero { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; padding: 40px 20px; }
        
        .label-new { color: var(--gold); font-weight: bold; letter-spacing: 4px; margin-bottom: 20px; font-size: 0.9rem; }

        /* LOGO-UL MARE - REPARAT PENTRU CLARITATE */
        .logo-wrap { position: relative; width: 320px; height: 320px; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; }
        .big-medallion { 
            width: 100%; 
            height: auto; 
            /* REPARAREA PIXELĂRII */
            image-rendering: -webkit-optimize-contrast; 
            image-rendering: crisp-edges; 
            filter: drop-shadow(0 0 30px rgba(0, 242, 255, 0.2));
        }

        .hero-text { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900; line-height: 1.1; text-transform: uppercase; }
        .hero-text span { color: var(--gold); }

        /* BUTON EMAIL & CONTRACT */
        .actions { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 40px; }
        
        .email-btn { 
            background: transparent; 
            border: 2px solid var(--gold); 
            color: white; 
            padding: 12px 30px; 
            border-radius: 50px; 
            text-decoration: none; 
            font-weight: bold; 
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .email-btn:hover { background: var(--gold); color: black; box-shadow: 0 0 20px rgba(197, 160, 89, 0.4); }

        .contract-box { background: rgba(255,255,255,0.05); padding: 15px 25px; border-radius: 10px; border: 1px solid #333; max-width: 90%; }
        .contract-label { font-size: 0.7rem; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        .contract-address { font-family: monospace; color: var(--cyan); word-break: break-all; font-size: 0.9rem; }

    </style>
</head>
<body>

    <!-- Social Sidebar -->
    <div class="social-sidebar">
        <a href="#"><i class="fab fa-twitter"></i></a>
        <a href="#"><i class="fab fa-telegram"></i></a>
        <a href="#"><i class="fab fa-linkedin"></i></a>
        <a href="#"><i class="fas fa-ship"></i></a> <!-- OpenSea icon alternative -->
    </div>

    <!-- Top Bar -->
    <div class="top-bar">
        <img src="logo_dael.png" alt="DAEL Logo">
        <h1>DAEL PROJECT</h1>
    </div>

    <!-- Main Content -->
    <section class="hero">
        <div class="label-new">NEW TOKEN ERA</div>
        
        <div class="logo-wrap">
            <img src="logo_dael.png" class="big-medallion" alt="DAEL Token">
        </div>

        <h1 class="hero-text">WELCOME TO DAEL.<br><span>NEW CONTRACT,</span><br>NEW POWER.</h1>

        <div class="actions">
            <!-- Butonul de Email cerut -->
            <a href="mailto:contact@daeinitiative.com" class="email-btn">
                <i class="fas fa-envelope"></i> CONTACT@DAEINITIATIVE.COM
            </a>

            <div class="contract-box">
                <div class="contract-label">Polygon Contract Address</div>
                <div class="contract-address">0x5876f0cb366f1b61e8797470996e76da4420676f</div>
            </div>
        </div>
    </section>

</body>
</html>
