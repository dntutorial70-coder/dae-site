<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAE Initiative Official</title>
    <style>
        body { 
            /* Imagine REALĂ de fundal: Textură de metal/carbon premium */
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0; 
        }
        .container { 
            max-width: 500px; 
            margin: auto; 
            background: rgba(255, 255, 255, 0.05); /* Efect de sticlă discret */
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .logo { 
            width: 130px; 
            height: 130px; 
            border-radius: 50%; 
            border: 2px solid #fbbf24; 
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.4); 
            margin-bottom: 20px; 
            background: #000;
        }
        h1 { color: #fbbf24; letter-spacing: 3px; font-size: 1.8rem; text-transform: uppercase; }
        p { color: #aaa; line-height: 1.6; font-size: 0.95rem; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .btn { 
            padding: 15px; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: bold; 
            color: #fff; 
            transition: all 0.3s ease; 
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .btn-x { background: #000; border: 1px solid #444; }
        .btn-tg { background: #229ED9; } /* Albastru Telegram oficial */
        .btn-li { background: #0077b5; }
        .btn-os { background: #2081e2; }
        .contract { 
            margin-top: 40px; 
            padding: 15px; 
            border: 1px solid rgba(251, 191, 36, 0.3); 
            border-radius: 12px; 
            background: rgba(0, 0, 0, 0.4); 
        }
        code { color: #fbbf24; font-size: 0.8rem; word-break: break-all; }
        .label { font-size: 0.7rem; text-transform: uppercase; color: #fbbf24; letter-spacing: 1px; margin-bottom: 5px; display: block;}
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="DAE Logo" class="logo">
        <h1>DAE INITIATIVE</h1>
        <p>Hybrid Gaming Ecosystem on Polygon Network. Bridging the gap between players and digital ownership.</p>
        
        <div class="btn-grid">
            <a href="https://x.com/denis_de84848" class="btn btn-x" target="_blank">Twitter / X</a>
            <a href="https://t.me/daeinitiative" class="btn btn-tg" target="_blank">Telegram</a>
            <a href="https://www.linkedin.com/in/denis-nicolae-4426023b8" class="btn btn-li" target="_blank">Founder</a>
            <a href="https://opensea.io/" class="btn btn-os" target="_blank">OpenSea</a>
        </div>

        <div class="contract">
            <span class="label">Polygon Contract Address</span>
            <code>0xf5d098ce7a673f0c179b7c310972b08333f98b1b</code>
        </div>
    </div>
</body>
</html>
